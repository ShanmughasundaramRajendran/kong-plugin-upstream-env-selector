
services:
  kong:
    build: .
    image: kong-upstream-env-selector:latest
    container_name: kong-upstream-env-selector
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong_active.yml
      KONG_PLUGINS: "bundled,upstream-env-selector"
      KONG_LOG_LEVEL: "debug"
      # If you want to use redis mode + caching, you must have the shared dict. We use custom template below.
      KONG_NGINX_HTTP_INCLUDE: /kong/nginx/includes/http_shared_dict.conf
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
      - "8002:8002"
    volumes:
      - ./kong/plugins/upstream-env-selector:/usr/local/share/lua/5.1/kong/plugins/upstream-env-selector:ro
      - ./examples/declarative:/kong/declarative:ro
      - ./examples/nginx/includes:/kong/nginx/includes:ro
    depends_on:
      - orders_api_dev
      - orders_api_prod
      - redis

  orders_api_dev:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "dev"
    ports:
      - "18080:8080"

  orders_api_prod:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "prod"
    ports:
      - "18081:8080"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
