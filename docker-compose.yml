
services:
  kong:
    build: .
    image: kong-upstream-env-selector:latest
    container_name: kong-upstream-env-selector
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/config/kong.yml
      KONG_PLUGINS: "bundled,upstream-env-selector"
      KONG_LOG_LEVEL: "debug"
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
      - "8002:8002"
    volumes:
      - ./kong/plugins/upstream-env-selector:/usr/local/share/lua/5.1/kong/plugins/upstream-env-selector:ro
      - ./config:/kong/config:ro
    depends_on:
      - orders_api_dev
      - orders_api_prod
      - orders_api_qa
      - orders_api_staging
      - orders_api_perf

  orders_api_dev:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "dev"
    ports:
      - "8080:8080"

  orders_api_prod:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "prod"
    ports:
      - "8081:8080"

  orders_api_qa:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "qa"
    ports:
      - "8082:8080"

  orders_api_staging:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "staging"
    ports:
      - "8083:8080"

  orders_api_perf:
    image: ealen/echo-server:latest
    environment:
      PORT: "8080"
      ECHO_RESPONSE: "perf"
    ports:
      - "8084:8080"
