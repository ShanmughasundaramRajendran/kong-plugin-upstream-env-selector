_format_version: "3.0"
_transform: true

services:
- name: orders-gateway-service
  host: orders-api-prod-upstream
  port: 80
  protocol: http
  routes:
  - name: orders-api-route
    paths:
    - /api/orders

upstreams:
- name: orders-api-dev-upstream
  targets:
  - target: orders_api_dev:8080
- name: orders-api-prod-upstream
  targets:
  - target: orders_api_prod:8080

plugins:
- name: upstream-env-selector
  service: orders-gateway-service
  config:
    use_redis: true
    redis:
      host: redis
      port: 6379
      database: 0
      timeout_ms: 200
      keepalive_ms: 60000
      pool_size: 100
    redis_key_prefix: upstream:
    cache_ttl_sec: 5
    negative_ttl_sec: 2
    redis_fail_open: true

    upstream_header_name: X-Upstream-Env
    strict: true
    normalize: true
    client_id_source: header
    client_id_header_name: X-Consumer-Id
    access_policy:
      sni: false
      header_name: X-Client-Env
      query_param_name: env
    endpoint:
      sni: false
      header_name: X-Resource-Env
      query_param_name: resource_env
